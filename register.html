<!DOCTYPE html>
<html>
<head>
<title>Register</title>
</head>

<body>

<h2>Register</h2>

<input type="text" id="name" placeholder="Name"><br><br>
<input type="text" id="phone" placeholder="Phone"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="pass" placeholder="Password"><br><br>

<button onclick="register()">Register</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBn8oFQWrE2c4OBqzP3tJKF3kVrNnC9EhY",
authDomain: "bhaibonflexiload.firebaseapp.com",
databaseURL: "https://bhaibonflexiload-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "bhaibonflexiload",
};

firebase.initializeApp(firebaseConfig);

function register(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var email=document.getElementById("email").value;
var pass=document.getElementById("pass").value;

firebase.auth().createUserWithEmailAndPassword(email,pass)
.then(function(user){

var uid=user.user.uid;

firebase.database().ref("users/"+uid).set({
name:name,
phone:phone,
balance:0
});

alert("Register Success");

});

}

</script>

</body>
</html>
